<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio — Miguel</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --red: #b91c1c;
      --red2: #ef4444;
      --blue: #1d4ed8;
      --gold: #d97706;
    }
    html, body { height:100%; overflow:hidden; font-family:'Barlow',sans-serif; background:#060810; }

    /* BG */
    .bg { position:fixed; inset:0; z-index:0; }
    .bg img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; }
    .bg::before {
      content:''; position:absolute; inset:0; z-index:1;
      background: linear-gradient(135deg,rgba(6,8,16,.6) 0%,rgba(6,8,16,.15) 40%,rgba(6,8,16,.55) 100%);
    }
    .bg::after {
      content:''; position:absolute; inset:0; z-index:2;
      background:
        radial-gradient(ellipse 70% 50% at 50% 105%,rgba(185,28,28,.22) 0%,transparent 65%),
        linear-gradient(to top,rgba(6,8,16,.98) 0%,rgba(6,8,16,.55) 35%,transparent 65%);
    }
    .vignette { position:fixed; inset:0; z-index:3; pointer-events:none;
      background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 45%,rgba(0,0,0,.6) 100%); }
    .scan { position:fixed; inset:0; z-index:4; pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 3px); }

    /* PARTICLES */
    .particles { position:fixed; inset:0; z-index:5; pointer-events:none; overflow:hidden; }
    .p { position:absolute; border-radius:50%; animation:prise linear infinite; opacity:0; }
    @keyframes prise {
      0%  { transform:translateY(105vh) scale(0); opacity:0; }
      8%  { opacity:.9; }
      85% { opacity:.5; }
      100%{ transform:translateY(-8vh) scale(1.4); opacity:0; }
    }

    /* STAGE */
    .stage { position:relative; z-index:6; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }

    /* SHIELD */
    .shield-wrap { margin-bottom:22px; position:relative; width:120px; height:120px; animation:shieldFloat 4s ease-in-out infinite; }
    .shield-wrap img { width:100%; height:100%; object-fit:contain;
      filter:drop-shadow(0 0 30px rgba(185,28,28,.8)) drop-shadow(0 0 12px rgba(59,130,246,.5)); }
    .ring1 { position:absolute; inset:-9px; border-radius:50%; border:2px solid transparent;
      border-top-color:var(--red2); border-right-color:rgba(185,28,28,.25); animation:spinR 3s linear infinite; }
    .ring2 { position:absolute; inset:-16px; border-radius:50%; border:1.5px solid transparent;
      border-bottom-color:rgba(29,78,216,.65); border-left-color:rgba(29,78,216,.2); animation:spinR 5s linear infinite reverse; }
    @keyframes shieldFloat { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-13px) rotate(3deg)} }
    @keyframes spinR { to{transform:rotate(360deg)} }

    /* CARD */
    .card {
      background:rgba(4,6,18,.78);
      backdrop-filter:blur(32px) saturate(2);
      -webkit-backdrop-filter:blur(32px) saturate(2);
      border:1px solid rgba(185,28,28,.3);
      border-radius:6px;
      padding:44px 56px 40px;
      max-width:650px; width:92%;
      position:relative; overflow:hidden;
      box-shadow:0 0 0 1px rgba(255,255,255,.04),0 60px 120px rgba(0,0,0,.85),inset 0 0 70px rgba(185,28,28,.05);
      animation:cardIn 1s cubic-bezier(.16,1,.3,1) both .1s;
    }
    .card::before{ content:''; position:absolute; top:-1px; left:-1px; width:20px; height:20px;
      border:2px solid var(--red2); border-right:none; border-bottom:none; border-radius:4px 0 0 0; }
    .card::after { content:''; position:absolute; bottom:-1px; right:-1px; width:20px; height:20px;
      border:2px solid var(--red2); border-left:none; border-top:none; border-radius:0 0 4px 0; }
    .acc-tr { position:absolute; top:-1px; right:-1px; width:20px; height:20px;
      border:2px solid rgba(185,28,28,.45); border-left:none; border-bottom:none; border-radius:0 4px 0 0; }
    .acc-bl { position:absolute; bottom:-1px; left:-1px; width:20px; height:20px;
      border:2px solid rgba(185,28,28,.45); border-right:none; border-top:none; border-radius:0 0 0 4px; }
    .shine { position:absolute; inset:0; pointer-events:none;
      background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.025) 50%,transparent 70%);
      animation:shine 6s ease-in-out infinite; }
    @keyframes cardIn { from{opacity:0;transform:translateY(50px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes shine { 0%,100%{opacity:0} 50%{opacity:1} }

    /* STRIPE */
    .stripe { height:2px; margin-bottom:30px;
      background:linear-gradient(90deg,transparent,var(--red) 20%,var(--gold) 50%,var(--red) 80%,transparent);
      animation:stripeG 2.5s ease-in-out infinite alternate; }
    @keyframes stripeG { from{opacity:.6} to{opacity:1;filter:brightness(1.6)} }

    /* TEXT */
    h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.3rem,5.5vw,3.7rem); letter-spacing:7px;
      text-align:center; color:#fff; line-height:1.05; margin-bottom:5px;
      text-shadow:0 0 40px rgba(185,28,28,.75),0 2px 8px rgba(0,0,0,.9); }
    h1 em { font-style:normal; color:var(--red2); }
    .subname { font-family:'Bebas Neue',sans-serif; font-size:clamp(.95rem,2.5vw,1.4rem); letter-spacing:10px;
      text-align:center; color:rgba(255,255,255,.28); margin-bottom:28px; }

    /* DIVIDER */
    .divrow { display:flex; align-items:center; gap:14px; margin-bottom:30px; }
    .divrow hr { flex:1; border:none; border-top:1px solid rgba(255,255,255,.1); }
    .divrow span { font-family:'Barlow Condensed',sans-serif; font-size:.72rem; font-weight:600;
      letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.26); }

    /* BUTTONS */
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .btn { position:relative; display:flex; align-items:center; gap:12px; padding:16px 20px;
      border:none; border-radius:4px; text-decoration:none; color:#fff;
      font-family:'Bebas Neue',sans-serif; font-size:1.1rem; letter-spacing:3px;
      cursor:pointer; overflow:hidden; transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;
      animation:btnIn .5s cubic-bezier(.16,1,.3,1) both; }
    .btn:nth-child(1){animation-delay:.35s}
    .btn:nth-child(2){animation-delay:.45s}
    .btn:nth-child(3){animation-delay:.55s}
    .btn:nth-child(4){animation-delay:.65s}
    @keyframes btnIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .btn::before { content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent); }
    .btn::after { content:''; position:absolute; top:0; left:-120%; width:55%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent); transition:left .5s; }
    .btn:hover::after{ left:165%; }
    .btn:hover { transform:translateY(-4px) scale(1.03); }
    .btn:active { transform:translateY(-1px) scale(.98); }

    .blue { background:linear-gradient(145deg,#0d3680,#1d4ed8 55%,#2563eb);
      box-shadow:0 4px 26px rgba(29,78,216,.45),inset 0 0 0 1px rgba(255,255,255,.07); }
    .blue:hover { box-shadow:0 10px 40px rgba(59,130,246,.65),inset 0 0 0 1px rgba(255,255,255,.12); }
    .red  { background:linear-gradient(145deg,#6b1111,#b91c1c 55%,#dc2626);
      box-shadow:0 4px 26px rgba(185,28,28,.5),inset 0 0 0 1px rgba(255,255,255,.07); }
    .red:hover  { box-shadow:0 10px 40px rgba(239,68,68,.7),inset 0 0 0 1px rgba(255,255,255,.12); }

    .num { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:.68rem; letter-spacing:1px;
      background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.12); border-radius:50%;
      width:24px; height:24px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

    /* FOOTER */
    .foot { margin-top:24px; text-align:center; font-family:'Barlow Condensed',sans-serif;
      font-size:.7rem; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.18); }
    .foot s { text-decoration:none; color:rgba(185,28,28,.5); margin:0 6px; }
  </style>
</head>
<body>

<div class="vignette"></div>
<div class="scan"></div>
<div class="particles" id="pts"></div>

<div class="stage">

  <div class="shield-wrap">
    <div class="ring2"></div>
    <div class="ring1"></div>
    <img
      src="escudo.png"
      alt="Escudo do Capitão América"
    />
  </div>

  <div class="card">
    <div class="acc-tr"></div>
    <div class="acc-bl"></div>
    <div class="shine"></div>

    <div class="stripe"></div>

    <h1>Portfólio</h1>
    <div class="subname"></div>

    <div class="divrow">
      <hr/><span>Escolha um Trimestre</span><hr/>
    </div>

    <div class="grid">
      <a href="1°tri.html" class="btn blue"><span class="num">01</span>Primeiro Trimestre</a>
      <a href="2°tri.html"  class="btn blue"><span class="num">02</span>Segundo Trimestre</a>
      <a href="3°tri.html" class="btn blue"><span class="num">03</span>Terceiro Trimestre</a>
      <a href="index.html"    class="btn red" ><span class="num">←</span>Voltar</a>
    </div>

    <div class="foot">HTML &amp; JavaScript <s>·</s> Portfolio Escolar <s>·</s> 2026</div>
  </div>

</div>

<script>
  const cols=['#b91c1c','#ef4444','#1d4ed8','#3b82f6','#d97706','rgba(255,255,255,.8)'];
  const c=document.getElementById('pts');
  for(let i=0;i<32;i++){
    const el=document.createElement('div');
    el.className='p';
    const s=Math.random()*4+1;
    el.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${9+Math.random()*9}s;animation-delay:${Math.random()*10}s;filter:blur(${Math.random()*.8}px)`;
    c.appendChild(el);
  }
</script>
</body>
</html>
